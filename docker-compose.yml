version: "3.9"

services:
  db:
    image: postgres:13
    container_name: biofit-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: biofit
      POSTGRES_PASSWORD: biofitpass
      POSTGRES_DB: biofitdb
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d # For initial SQL scripts
      - ./db/init/feedback_sleep.csv:/feedback_sleep.csv
    ports:
      - "5432:5432"
    # Phase 3 §9.7: migrate 컨테이너가 db ready를 기다리는 데 사용
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biofit -d biofitdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  streamlit:
    build:
      context: ./streamlit_app
      dockerfile: Dockerfile
    container_name: biofit-streamlit
    depends_on:
      - db
      - data
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://biofit:biofitpass@db:5432/biofitdb
      DATA_SERVICE_URL: http://data:8001/fetch
    volumes:
      - ./streamlit_app:/app
    ports:
      - "8501:8501"

  data:
    build:
      context: ./data_service
      dockerfile: Dockerfile
    container_name: biofit-data
    restart: unless-stopped
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://biofit:biofitpass@db:5432/biofitdb
      # Phase 3 §9.1 expand: 1=csv_to_db가 fitbit_daily_features에 dual-write, 0=기존 {uid}_*만 (default 0)
      - DUAL_WRITE_NORMALIZED=0
    ports:
      - "8000:8001"

  streamlit-feedback:
    build:
      context: ./streamlit_app
    command: streamlit run streamlit_feedback.py --server.port 8502
    container_name: biofit-streamlit-feedback
    depends_on:
      - feedback-api
    restart: unless-stopped
    environment:
      - FEEDBACK_API_URL=http://feedback-api:8001/feedback
    volumes:
      - ./streamlit_app:/app
    ports:
      - "8502:8502"

  feedback-api:
    build:
      context: ./feedback_api
    container_name: feedback-api
    restart: unless-stopped
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://biofit:biofitpass@db:5432/biofitdb
    ports:
      - "8001:8001"

  # Phase 3 §9.7: 1회성 마이그레이션 컨테이너. db healthcheck 후 alembic upgrade head 실행하고 종료.
  # 새 마이그레이션이 추가되면 다음 docker compose up 시 자동 적용.
  migrate:
    build:
      context: ./ai_service
      dockerfile: Dockerfile
    container_name: biofit-migrate
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://biofit:biofitpass@db:5432/biofitdb
    command: ["alembic", "upgrade", "head"]
    restart: "no"
    volumes:
      - ./ai_service:/app

  ai_service:
    build:
      context: ./ai_service
      dockerfile: Dockerfile
    container_name: biofit-ai-service
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

    environment:
      DATABASE_URL: postgresql://biofit:biofitpass@db:5432/biofitdb
      MODEL_PATH: /app/models/mistral-7b-instruct-v0.2.Q4_K_M.gguf
      WINDOW: 7
      OPENAI_BASE: http://10.38.38.40:8004/v1
      OPENAI_KEY: token-abc123
      # vLLM에 등록된 model id (서버마다 다름. ./llama3 또는 openai/gpt-oss-20b 등)
      LLM_MODEL_NAME: openai/gpt-oss-20b
      # Phase 3 §9.1 expand: 1=fitbit_daily_features에서 read, 0=기존 {uid}_* 테이블 (default 0 = 옵트아웃)
      USE_NORMALIZED_FEATURES: "0"
      # Phase 4 §9.1 contract: HTTP API 경유 (1=data_service /users/{uid}/features, 0=DB 직접)
      USE_DATA_SERVICE_API: "0"
      USE_FEEDBACK_API_HTTP: "0"
      DATA_SERVICE_BASE: "http://data:8001"
      FEEDBACK_API_BASE: "http://feedback-api:8001"

    volumes:
      - ./ai_service:/app

    ports:
      - "8002:8000"

  group_service:
    build:
      context: ./group_service
      dockerfile: Dockerfile
    container_name: biofit-group-service
    depends_on:
      - db
    restart: unless-stopped

    environment:
      DATABASE_URL: postgresql://biofit:biofitpass@db:5432/biofitdb

    volumes:
      - ./group_service:/app

    ports:
      - "8003:8003"


volumes:
  pgdata:
